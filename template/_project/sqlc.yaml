version: "2"
sql:
  - engine: "postgresql"
    schema: "internal/db/schema"
    queries: "internal/db/queries"
    gen:
      go:
        package: "db"
        out: "internal/db/gen"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "uuid"
            go_type: "string"
